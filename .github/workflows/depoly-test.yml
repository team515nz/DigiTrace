name: Deploy code-optimization
on:
  push:
    branches:
      - code-optimization

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Subfolder
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          target-folder: code-optimization
          branch: main # זה ידחוף את התיקייה לתוך ה-code-optimization שלך
